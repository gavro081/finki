apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-app
  namespace: shield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shield-app
  template:
    metadata:
      labels:
        app: shield-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
