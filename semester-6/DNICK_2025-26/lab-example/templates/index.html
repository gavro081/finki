{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>index</title>
    <link rel="stylesheet" href="{% static 'bootstrap-5.3.5-dist/css/bootstrap.css' %}">
    <script src="{% static 'bootstrap-5.3.5-dist/js/bootstrap.bundle.js' %}"></script>
</head>
<body style="background-color: #e3e3db">
<nav style="background-color: #000057;"
     class="nav p-4 align-content-center justify-content-center">
    <a href="{% url 'index' %}">
        <img src="{% static 'main.png' %}" alt="main image">
    </a>
</nav>
<div style="background-color: #6ea8d9"
     class="p-2">
</div>
<div class="mt-4 container-fluid d-flex justify-content-end">
        <a href="{% url 'add_book' %}" class="btn text-white btn-primary">
            Додај нова книга
        </a>
</div>

<div class="container px-5 mt-4">
    <div class="row">
        {% for book in books %}
        <div class="col-4">
            <div class="card shadow-sm text-center p-3 mb-4">
                <a href="{% url 'book_detail' book.id %}">
                <img src="{{ book.image.url }}"
                     class="card-img-top"
                     style="height: 300px; object-fit: fill;"
                     alt="{{ book.title }}">
                </a>
                <div class="card-body">
                    <h6 class="fw-bold">{{ book.title }}</h6>
                    <p class="text-muted">Цена: {{ book.price }} ден.</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
