{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Rental System</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.css' %}"/>
    <script src="{% static 'bootstrap/js/bootstrap.bundle.js' %}"></script>
</head>
<body>
    <nav class="justify-content-between align-items-center" style="display: flex; margin-inline: 150px">
        <div>House M5</div>
        <div style="display: flex; gap: 30px; align-items: center; justify-content: center">
            <p class="mt-3">About</p>
            <p class="mt-3">Projects</p>
            <p class="mt-3">Services</p>
            <p class="mt-3">Contacts</p>
            <button class="btn btn-dark">Contact us</button>
        </div>
    </nav>


    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-6 my-auto">
                <h1>EDIT: House {{ property_id }}</h1>
            </div>
            <div class="col-6">
                <img src="{% static 'home1.jpg' %}" >
            </div>
        </div>
    </div>

    <div class="container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <label for="characteristics">Characteristics</label>
            <input type="text" name="characteristics" id="characteristics" class="form-control mb-4" value="{{ char_str }}">
            <button type="submit" class="btn btn-dark w-100">Submit</button>
        </form>
    </div>
</body>
</html>
