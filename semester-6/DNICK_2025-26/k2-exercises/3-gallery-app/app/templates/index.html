{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.css' %}">
    <script src="{% static 'bootstrap/js/bootstrap.bundle.js' %}"></script>
</head>
<body style="background-color: #f5f0e8;">
<div style="background: url('{% static 'main_header_bg-copyright.jpg' %}') center/cover no-repeat; height: 400px;">
    <div>
        <img src="{% static 'logo.png' %}" width="200">
        <div style="border: .5px solid gray"></div>
    </div>
    <h1 class="text-center text-white fw-bold" style="margin-top: 150px;">Upcoming Events</h1>
</div>


<div class="container" style="margin-top: 50px;">
    <div class="row" style="gap: 50px">
        {% for entry in exhibition_data %}
            <div style="display: flex; align-items: center;">
                <div class="card-body col-8">
                    <p style="color: gray; font-size: 0.9rem; margin-bottom: 4px;">
                        {{ entry.exhibition.start_date }} - {{ entry.exhibition.end_date }}
                    </p>
                    <h1>{{ entry.exhibition.title }}</h1>
                    <p><strong>{{ entry.exhibition.location }}</strong></p>
                    <p>{{ entry.exhibition.description }}</p>
                </div>
                <div class="col-4 d-flex justify-content-center">
                    <img src="{{ entry.artwork.image.url }}" class="img-fluid">
                </div>
            </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
