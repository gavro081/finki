{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Doctors System</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.css' %}"/>
    <script src="{% static 'bootstrap/js/bootstrap.bundle.js' %}"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm" style="background-color: #f6f6f6">
    <div class="container-fluid px-5">
        <a class="navbar-brand text-danger" href="#">Cakery&amp;Bakery</a>
        <div class="ms-auto">
            <a class="nav-link d-inline text-black-50" href="#">Home</a>
            <a class="nav-link d-inline text-black-50" href="#">About</a>
            <a class="nav-link d-inline text-dark" href="#">Add</a>
            <a class="nav-link d-inline text-black-50" href="#">Pricing</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-5">
    <div style="padding: 50px 0; background-color: #f6f6f6; margin-block: 70px">
        <div class="row justify-content-center">
            <div class="col-6">
                <h3 class="text-center text-danger fw-bold">Add new cake</h3>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-danger w-100">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>


<footer class="bg-danger mt-auto text-white px-5" style="display: flex; justify-content: space-between; align-items: center;">
    <p class="py-4 m-0">Copyright &copy; HCI 2025</p>
    <p class="m-0"><u>Privacy</u> <u>Terms</u> <u>Add</u></p>
</footer>
